<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precifica Já</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 10px;
}

.container {
    max-width: 500px;
    margin: auto;
    background: #fff;
    padding: 15px;
    border-radius: 10px;
}

h2 {
    text-align: center;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #28a745;
    color: white;
    font-weight: bold;
}

img {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 Precifica Já</h2>

<button onclick="startScanner()">📷 Escanear Produto</button>

<div id="reader"></div>

<input type="text" id="nome" placeholder="Nome do produto">

<input type="file" accept="image/*" capture="environment" id="foto">

<img id="preview">

<hr>

<h3>💰 Precificação</h3>

<input type="number" id="quantidade" placeholder="Quantidade">
<input type="number" id="precoTotal" placeholder="Preço Total">
<input type="number" id="precoVenda" placeholder="Preço de Venda">

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

<button onclick="enviarWhats()">📲 Enviar no WhatsApp</button>

</div>

<script>

let precoUnitario = 0;
let lucro = 0;
let sugestao = 0;

function startScanner() {
    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },
        (codigo) => {
            html5QrCode.stop();
            buscarProduto(codigo);
        }
    );
}

function buscarProduto(codigo) {
    fetch("https://world.openfoodfacts.org/api/v0/product/" + codigo + ".json")
    .then(res => res.json())
    .then(data => {
        if (data.status === 1) {
            document.getElementById("nome").value = data.product.product_name;

            if (data.product.image_url) {
                document.getElementById("preview").src = data.product.image_url;
            }
        } else {
            alert("Produto não encontrado, cadastre manualmente.");
        }
    });
}

document.getElementById("foto").addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (file) {
        document.getElementById("preview").src = URL.createObjectURL(file);
    }
});

function calcular() {
    let qtd = parseFloat(document.getElementById("quantidade").value);
    let total = parseFloat(document.getElementById("precoTotal").value);
    let venda = parseFloat(document.getElementById("precoVenda").value);

    if (!qtd || !total || !venda) {
        alert("Preencha todos os campos!");
        return;
    }

    precoUnitario = total / qtd;
    lucro = ((venda - precoUnitario) / precoUnitario) * 100;
    sugestao = precoUnitario * 1.3;

    document.getElementById("resultado").innerHTML =
        "Preço unitário: R$ " + precoUnitario.toFixed(2) + "<br>" +
        "Lucro: " + lucro.toFixed(2) + "%<br>" +
        "Sugestão (30%): R$ " + sugestao.toFixed(2);
}

function enviarWhats() {
    let nome = document.getElementById("nome").value;

    let msg =
        "📦 Produto: " + nome + "%0A" +
        "💰 Unitário: R$ " + precoUnitario.toFixed(2) + "%0A" +
        "💵 Venda: R$ " + document.getElementById("precoVenda").value + 
        " (" + lucro.toFixed(2) + "%)%0A" +
        "📊 Sugestão: R$ " + sugestao.toFixed(2);

    let url = "https://wa.me/?text=" + msg;

    window.open(url, "_blank");
}

</script>

</body>
</html>
